name: Sync to Hugging Face
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF Spaces
        run: |
          git remote add hf https://Kiba945:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Kiba945/english-pratice
          git push hf main --force